<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renacer Nuevo | Fundación</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f7f7f8',
              100: '#ececf0',
              200: '#d5d6db',
              300: '#b1b4bd',
              400: '#868b98',
              500: '#646a78',
              600: '#4f5460',
              700: '#41444e',
              800: '#383a42',
              900: '#313339',
              950: '#202125',
            },
            accent: {
              500: 'rgb(11, 83, 148)', // Requested Blue
              600: 'rgb(9, 66, 118)', // Darker shade for hover
            }
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['"Lato"', 'sans-serif'],
          },
          animation: {
            'fade-in-up': 'fadeInUp 1s ease-out forwards',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    html {
      overflow-y: scroll;
    }

    body {
      font-family: 'Lato', sans-serif;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Playfair Display', serif;
    }

    /* Swiper Customization */
    .swiper-pagination-bullet {
      background: white !important;
      opacity: 0.5;
      width: 10px;
      height: 10px;
    }

    .swiper-pagination-bullet-active {
      opacity: 1;
      background: rgb(11, 83, 148) !important;
      /* accent-500 */
    }

    .swiper-button-next,
    .swiper-button-prev {
      color: white !important;
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    .swiper-button-next:hover,
    .swiper-button-prev:hover {
      opacity: 1;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "swiper": "https://esm.sh/swiper@11",
    "swiper/react": "https://esm.sh/swiper@11/react",
    "swiper/modules": "https://esm.sh/swiper@11/modules",
    "swiper/": "https://esm.sh/swiper@^12.0.3/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-gray-50 text-brand-800 antialiased">
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
